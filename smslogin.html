<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Smart Vote</title>
    <link rel="stylesheet" href="login.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* 🔹 Body */
body {
    background: linear-gradient(to bottom, #0f172a, #020617);
    color: white;
}

/* 🔹 Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    color: #38bdf8;
    font-weight: 600;
    font-size: 20px;
}

.nav-right {
    display: flex;
    gap: 15px;
    align-items: center;
}

.login-btn {
    background: #38bdf8;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
}

/* 🔹 Center Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

/* 🔹 Card */
.login-card {
    background: #1e293b;
    padding: 35px;
    border-radius: 12px;
    width: 380px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

/* 🔹 Icon */
.icon-circle {
    width: 60px;
    height: 60px;
    margin: auto;
    background: #0ea5e9;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
    font-size: 24px;
}

/* 🔹 Text */
.login-card h2 {
    margin-bottom: 10px;
}

.login-card p {
    font-size: 14px;
    color: #cbd5f5;
    margin-bottom: 20px;
}

/* 🔹 Input */
.login-card label {
    display: block;
    text-align: left;
    margin-bottom: 5px;
    font-size: 14px;
}

.login-card input {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #020617;
    color: white;
    margin-bottom: 20px;
}

/* 🔹 Button */
.otp-btn {
    width: 100%;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
}

/* 🔹 Register */
.register {
    margin-top: 15px;
    font-size: 14px;
}

.register a {
    color: #38bdf8;
    text-decoration: none;
}
/* 🌞 LIGHT MODE */
/* 🌞 LIGHT MODE (LOGIN PAGE) */
.light-mode {
    background: #f1f5f9;
    color: #0f172a;
}

/* Navbar */
.light-mode .navbar {
    background: #e2e8f0;
    border-bottom: 1px solid #cbd5e1;
}

/* Login card */
.light-mode .login-card {
    background: white;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

/* Text */
.light-mode .login-card p {
    color: #475569;
}

/* Input */
.light-mode .login-card input {
    background: #f8fafc;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

/* Label */
.light-mode .login-card label {
    color: #334155;
}

/* Button */
.light-mode .otp-btn {
    background: #0ea5e9;
    color: white;
}

/* Register link */
.light-mode .register a {
    color: #0284c7;
}
    </style>
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
    <div class="logo">☑ Smart Vote</div>
    <div class="nav-right">
        <span class="icon" style="cursor: pointer;">☀</span>
        <button class="login-btn">Login</button>
    </div>
</header>

<!-- 🔹 Login Card -->
<div class="container">
    <div class="login-card">

        <div class="icon-circle">☑</div>

        <h2>Login</h2>
        <p>Enter your Roll No/ID to receive an OTP</p>

        <label>Roll No/ID</label>
        <input type="text" placeholder="BCA236001">

        <button class="otp-btn">Send OTP</button>

        <!-- <div class="register">
            Don't have an account? <a href="#">Register</a>
        </div> -->

    </div>
</div>

<script>
    // ==============================
// 🌙 DARK MODE TOGGLE
// ==============================
const toggleIcon = document.querySelector(".icon");

toggleIcon.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
        toggleIcon.textContent = "🌙";
    } else {
        toggleIcon.textContent = "☀";
    }
});
// const button=document.querySelector(".otp-btn");
// button.addEventListener("click",()=>{
//     window.location.href = "smsotp.html";
//     // console.log("hey")
// })

// backend connection
const btn = document.querySelector(".otp-btn");

btn.addEventListener("click", async () => {

    const rollNo = document.querySelector("input").value;

    if (!rollNo) {
        alert("Enter Roll No ❌");
        return;
    }

    const res = await fetch("http://localhost:5000/api/auth/send-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ rollNo })
    });

    const data = await res.json();

    alert(data.message);

    localStorage.setItem("rollNo", rollNo);

    window.location.href = "smsotp.html";
});
</script>
</body>
</html>

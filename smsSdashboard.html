<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Smart Vote</title>
    <!-- <link rel="stylesheet" href="dashboard.css"> -->
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* 🔹 Body */
body {
    background: linear-gradient(to bottom, #0f172a, #020617);
    color: white;
}

/* 🔹 Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    color: #38bdf8;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
}

.nav-links a {
    margin: 0 15px;
    color: #cbd5f5;
    text-decoration: none;
    cursor: pointer;
}

.nav-right {
    display: flex;
    gap: 15px;
    align-items: center;
}

.user {
    color: #cbd5f5;
    cursor: pointer;
}

/* 🔹 Container */
.container {
    padding: 30px 40px;
}

/* 🔹 Top */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.status {
    background: #334155;
    padding: 8px 15px;
    border-radius: 20px;
}

/* 🔹 Search */
.search {
    width: 400px;
    margin: 20px 0;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #020617;
    color: white;
}

/* 🔹 Headings */
h2 {
    margin: 25px 0 15px;
}

/* 🔹 Cards */
.cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 420px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* 🔹 Card Header */
.card-header {
    display: flex;
    gap: 15px;
    align-items: center;
    margin-bottom: 10px;
}

.avatar {
    width: 50px;
    height: 50px;
    background: #0ea5e9;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
}
.vote-btn {
    width: 100%;
    margin-top: 15px;
    padding: 10px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
}

.vote-btn:hover {
    background: #0ea5e9;
}

/* 🔹 Badge */
.badge {
    display: inline-block;
    background: #38bdf8;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    margin-top: 5px;
}

.badge.gray {
    background: #94a3b8;
}

/* 🔹 Text */
.card p {
    font-size: 14px;
    color: #cbd5f5;
}

/* 🗳️ Submit Vote Button */
#finalVoteBtn {
    display: block;
    margin: 30px auto;
    padding: 14px 30px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;

    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: rgb(0, 0, 0);

    cursor: pointer;
    transition: all 0.3s ease;

    box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
}

/* 🔥 Hover Effect */
#finalVoteBtn:hover {
    
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    box-shadow: 0 10px 25px rgba(14, 165, 233, 0.6);
}

/* 🔻 Click Effect */
#finalVoteBtn:active {
    /* transform: scale(0.95); */
    box-shadow: 0 3px 10px rgba(14, 165, 233, 0.3);
}

/* 🚫 Disabled State */
#finalVoteBtn:disabled {
    background: #475569;
    cursor: not-allowed;
    box-shadow: none;
    opacity: 0.7;
}
/* 🌞 LIGHT MODE */
/* 🌞 LIGHT MODE (DASHBOARD) */
.light-mode {
    background: #f1f5f9;
    color: #0f172a;
}

.light-mode .navbar {
    background: #e2e8f0;
    border-bottom: 1px solid #cbd5e1;
}

.light-mode .nav-links a {
    color: #334155;
}

.light-mode .user {
    color: #0f172a;
}

.light-mode .card {
    background: white;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

.light-mode .card p {
    color: #475569;
}

.light-mode .search {
    background: #f8fafc;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}
.light-mode .status{
    background-color: white;
    /* color: white; */
    border: 1px solid #cbd5e1;
}
    </style>
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
    <div class="logo">☑ Smart Vote</div>

    <nav class="nav-links">
        <a class="dashboard">Dashboard</a>
        <a href="smsStudentRegister.html">Run for Office</a>
        <a href="smsStudentResult.html">Results</a>
    </nav>

    <div class="nav-right">
        <span class="icon" style="cursor: pointer;">☀</span>
        <span class="user">
        <span id="userName">Loading...</span> →
</span>
    </div>
</header>

<!-- 🔹 Main -->
<div class="container">

    <div class="top-bar">
        <div>
            <h1>Student Dashboard</h1>
            <span class="user">WELCOME </span>
            <span id="userNameN">Loading...</span> 
        </div>

        <div class="status">Election: Ended</div>
    </div>

    <!-- 🔍 Search
    <input type="text" class="search" placeholder="Search candidates..."> -->

    <!-- 🔹 CR Candidates -->
    <h2>CR Candidates</h2>

    <div class="cards" id="crContainer"></div>

    <!-- 🔹 DCR Candidates -->
    <h2>DCR Candidates</h2>

    <div class="cards" id="dcrContainer"></div>

    <button id="finalVoteBtn">Submit Vote 🗳️</button>

<!-- <script>

</script> -->

<script>

let selectedCR = null;
let selectedDCR = null;

let userName = localStorage.getItem("name");

if (!userName || userName === "undefined") {
    userName = "User";
}

document.getElementById("userName").innerText = userName;
document.getElementById("userNameN").innerText = userName;
// 🔐 PROTECT PAGE
if (!localStorage.getItem("isLoggedIn")) {
    window.location.replace("smshome.html");
}

// 🚫 BLOCK BACK BUTTON
window.history.pushState(null, null, window.location.href);
window.onpopstate = function () {
    window.history.pushState(null, null, window.location.href);
};
// logout
const userText = document.querySelector(".user");

userText.addEventListener("click", () => {
    if (confirm("Logout?")) {
        localStorage.clear();

        // ❗ IMPORTANT
        window.location.replace("smshome.html");
    }
});

// backend
async function loadCandidates() {
    try {
        const res = await fetch("http://localhost:5000/api/candidates/approved");
        const data = await res.json();

        console.log("Candidates:", data); // 🔍 DEBUG

        const crContainer = document.getElementById("crContainer");
        const dcrContainer = document.getElementById("dcrContainer");

        crContainer.innerHTML = "";
        dcrContainer.innerHTML = "";

        if (!data || data.length === 0) {
            crContainer.innerHTML = "<p>No CR candidates</p>";
            dcrContainer.innerHTML = "<p>No DCR candidates</p>";
            return;
        }

        data.forEach(c => {

            const pos = (c.position || "").trim().toUpperCase();

            const card = `
                <div class="card">
                    <div class="card-header">
                        <div class="avatar">👤</div>
                        <div>
                            <h3>${c.name}</h3>
                            <span class="badge ${pos === "DCR" ? "gray" : ""}">
                                ${pos}
                            </span>
                        </div>
                    </div>

                    <p>${c.manifesto || "No manifesto provided"}</p>

                    <button class="vote-btn"
                        data-id="${c._id}"
                        data-type="${pos}">
                        Vote
                    </button>
                </div>
            `;

            if (pos === "CR") {
                crContainer.innerHTML += card;
            } else if (pos === "DCR") {
                dcrContainer.innerHTML += card;
            }
        });

        attachVoteEvents();

    }catch (err) {
    console.log("ERROR 👉", err);
    alert("Error loading candidates ❌");
}
}

// if no candidate
// if (data.length === 0) {
//     crContainer.innerHTML = "<p>No CR candidates</p>";
//     dcrContainer.innerHTML = "<p>No DCR candidates</p>";
// }
// ==========================
// 🗳️ VOTE FUNCTION
// ==========================

function attachVoteEvents() {

    const buttons = document.querySelectorAll(".vote-btn");

    buttons.forEach(btn => {
        btn.addEventListener("click", async () => {

            const id = btn.dataset.id;
            const type = btn.dataset.type; // CR / DCR

            const name = btn.closest(".card").querySelector("h3").innerText;

        if (type === "CR") {
            selectedCR = { id, name };

            document.querySelectorAll('[data-type="CR"]').forEach(b => {
                b.style.background = "";
                b.innerText = "Vote";
            });

        } else {
            selectedDCR = { id, name };

            document.querySelectorAll('[data-type="DCR"]').forEach(b => {
                b.style.background = "";
                b.innerText = "Vote";
            });
        }

        btn.innerText = "Selected ✅";
        btn.style.background = "green";

            // 🔑 use rollNo
            const userId = localStorage.getItem("rollNo");

            if (!userId) {
                alert("Login first ❌");
                return;
            }

            const res = await fetch("http://localhost:5000/vote", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    userId,
                    candidateId,
                    position
                })
            });

            const data = await res.json();

            alert(data.message);
        });
    });
}


// confirm vote
document.getElementById("finalVoteBtn").addEventListener("click", async () => {

    if (!selectedCR || !selectedDCR) {
        alert("Select both CR and DCR ❌");
        return;
    }

    const message = `
Confirm your vote:

CR: ${selectedCR.name}
DCR: ${selectedDCR.name}
`;

    const confirmVote = confirm(message);

    if (!confirmVote) return;

    const userId = localStorage.getItem("rollNo");

    const res = await fetch("http://localhost:5000/vote-both", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            userId,
            crId: selectedCR.id,
            dcrId: selectedDCR.id
        })
    });

    const data = await res.json();
    alert(data.message);

    disableAllButtons();
});

function disableAllButtons() {
    document.querySelectorAll(".vote-btn").forEach(btn => {
        btn.disabled = true;
        btn.innerText = "Voted ❌";
    });
}

// elction status
async function updateElectionStatus() {

    const res = await fetch("http://localhost:5000/api/election");
    const data = await res.json();

    const statusBox = document.querySelector(".status");

    const now = new Date().getTime();
    const start = new Date(data.startTime).getTime();
    const end = new Date(data.endTime).getTime();

    if (data.isDeclared || now > end) {
        statusBox.innerText = "Election: Ended ❌";
        statusBox.style.background = "#ef4444"; // red
    }
    else if (now >= start && now <= end) {
        statusBox.innerText = "Election: Live 🟢";
        statusBox.style.background = "#22c55e"; // green
    }
    else {
        statusBox.innerText = "Election: Not Started ⏳";
        statusBox.style.background = "#f59e0b"; // yellow
    }
}

async function checkElectionStatus() {
    const res = await fetch("http://localhost:5000/api/election");
    const data = await res.json();

    if (data.isDeclared) {
        disableAllButtons();
        document.getElementById("finalVoteBtn").innerText = "Voting Closed ❌";
        document.getElementById("finalVoteBtn").disabled = true;
    }
}

loadCandidates();
checkElectionStatus();
updateElectionStatus();

    // ==============================
// 🌙 DARK MODE TOGGLE
// ==============================
const toggleIcon = document.querySelector(".icon");

toggleIcon.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
        toggleIcon.textContent = "🌙";
    } else {
        toggleIcon.textContent = "☀";
    }
});






</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <link rel="stylesheet" href="otp.css">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* 🔹 Body */
body {
    background: linear-gradient(to bottom, #0f172a, #020617);
    color: white;
}

/* 🔹 Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    color: #38bdf8;
    font-size: 20px;
    font-weight: 600;
}

.nav-right {
    display: flex;
    gap: 15px;
    align-items: center;
}

.login-btn {
    background: #38bdf8;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
}

/* 🔹 Container */
.container {
    height: 85vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔹 Card */
.card {
    background: #1e293b;
    padding: 35px;
    border-radius: 12px;
    width: 400px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
}

/* 🔹 Icon */
.icon-circle {
    width: 60px;
    height: 60px;
    background: #0ea5e9;
    border-radius: 50%;
    margin: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    margin-bottom: 15px;
}

/* 🔹 Text */
.card h2 {
    margin-bottom: 10px;
}

.card p {
    font-size: 14px;
    color: #cbd5f5;
}

.email-text {
    margin: 15px 0;
}

/* 🔹 OTP Inputs */
.otp-boxes {
    display: flex;
    justify-content: space-between;
    margin: 20px 0;
}

.otp-boxes input {
    width: 45px;
    height: 50px;
    text-align: center;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid #334155;
    background: #020617;
    color: white;
}

/* 🔹 Button */
.verify-btn  {
    width: 100%;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}
.resend-btn{
    width: 50%;
    padding: 5px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    margin-top: 15px;
    cursor: pointer;
}
.resend-btn:disabled {
    opacity: 0.7;
    cursor: not-allowed;
}



/* 🌞 LIGHT MODE */
/* 🌞 LIGHT MODE (OTP PAGE) */
.light-mode {
    background: #f1f5f9;
    color: #0f172a;
}

.light-mode .navbar {
    background: #e2e8f0;
    border-bottom: 1px solid #cbd5e1;
}

.light-mode .card {
    background: white;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

.light-mode .card p {
    color: #475569;
}

.light-mode .otp-boxes input {
    background: #f8fafc;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

.light-mode .change-email {
    color: #334155;
}
    </style>
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
    <div class="logo">☑ Smart Vote</div>
    <div class="nav-right">
        <span class="icon" style="cursor: pointer;">☀</span>
        <button class="login-btn">Login</button>
    </div>
</header>

<!-- 🔹 OTP Card -->
<div class="container">
    <div class="card">

        <div class="icon-circle">☑</div>

        <h2>Login</h2>
        <p>Enter the OTP sent to your email</p>

        <!-- <p class="email-text">
            OTP sent to <strong>rahul@college.edu</strong>
        </p> -->

        <!-- OTP Boxes -->
        <div class="otp-boxes">
            <input type="text" maxlength="1"class="otp-input">
            <input type="text" maxlength="1"class="otp-input">
            <input type="text" maxlength="1"class="otp-input">
            <input type="text" maxlength="1"class="otp-input">
            <input type="text" maxlength="1"class="otp-input">
            <input type="text" maxlength="1"class="otp-input">
        </div>

        <p id="timer">OTP expires in 02:00</p>

    <button class="verify-btn">Verify</button>
    <button onclick="resendOTP()" class="resend-btn"  disabled>Resend OTP 🔁 </button>

    </div>
</div>


<script>
    // ==============================
// 🌙 DARK MODE TOGGLE
// ==============================
const toggleIcon = document.querySelector(".icon");

toggleIcon.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
        toggleIcon.textContent = "🌙";
    } else {
        toggleIcon.textContent = "☀";
    }
});
// const vButton=document.querySelector(".verify-btn");
// vButton.addEventListener("click",()=>{
//     window.location.href = "smsSdashboard.html";
// })

// backend connection 
const inputs = document.querySelectorAll(".otp-input");
const btn = document.querySelector(".verify-btn");
const timerElement = document.getElementById("timer");
const resendBtn = document.querySelector(".resend-btn");



// ==============================
// 🔢 OTP INPUT LOGIC
// ==============================

inputs.forEach((input, index) => {

    // Only numbers + auto move
    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    // Backspace → previous
    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });

    // Arrow navigation
    input.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
        if (e.key === "ArrowLeft" && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

// Auto focus first box
inputs[0].focus();



// ==============================
// ⏳ TIMER
// ==============================

let timeLeft = 120; // 2 min
let timer;

// 🔁 START TIMER FUNCTION
function startTimer() {

    resendBtn.disabled = true; // disable button

    timer = setInterval(() => {

        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        seconds = seconds < 10 ? "0" + seconds : seconds;

        timerElement.innerText = `OTP expires in ${minutes}:${seconds}`;

        if (timeLeft < 30) {
            timerElement.style.color = "red";
        }

        timeLeft--;

        // ⛔ Timer finished
        if (timeLeft < 0) {
            clearInterval(timer);
            timerElement.innerText = "OTP expired ❌";

            resendBtn.disabled = false; // ✅ enable button
        }

    }, 1000);
}
startTimer();

// 🔁 RESEND OTP
// ==============================

async function resendOTP() {
    const rollNo = localStorage.getItem("rollNo");

    const res = await fetch("http://localhost:5000/api/auth/send-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ rollNo })
    });

    const data = await res.json();
    alert(data.message);

    // reset timer
    clearInterval(timer);
    timeLeft = 120;
    timerElement.style.color = "white";

    startTimer(); // restart timer
}

btn.addEventListener("click", async () => {
    // ❌ Expired check
    if (timeLeft <= 0) {
        alert("OTP expired ❌");
        return;
    }

    let otp = "";
    document.querySelectorAll("input").forEach(i => otp += i.value);

    const rollNo = localStorage.getItem("rollNo");

    const res = await fetch("http://localhost:5000/api/auth/verify-otp", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ rollNo, otp })
    });

    const data = await res.json();

    // ❌ WRONG OTP
    if (data.message && data.message !== "Login success ✅") {
        alert(data.message);
        return;
    }

    // ✅ LOGIN SUCCESS
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("role", data.role); // 👈 VERY IMPORTANT
    if (!data.name) {
    alert("Name not received from server ❌");
    console.log("DEBUG DATA 👉", data);
    return;
}

localStorage.setItem("name", data.name); 
    

    // 🔀 REDIRECTION BASED ON ROLE
    if (data.role === "admin") {
        window.location.href = "smsAdminDashboard.html";
    } else {
        window.location.href = "smsSdashboard.html";
    }
});
</script>
</body>
</html>

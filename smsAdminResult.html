<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Results</title>
    <link rel="stylesheet" href="admin-results.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* 🔹 Body */
body {
    background: linear-gradient(to bottom, #0f172a, #020617);
    color: white;
}

/* 🔹 Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    color: #38bdf8;
    cursor: pointer;
}

.nav-links a {
    margin: 0 10px;
    color: #cbd5f5;
    text-decoration: none;
}

.nav-right {
    display: flex;
    gap: 15px;
}
.user {
    color: #cbd5f5;
    cursor: pointer;
}

/* 🔹 Container */
.container {
    padding: 30px 40px;
}

/* 🔹 Top */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.actions button {
    margin-left: 10px;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
}

/* Buttons */
.declare {
    background: #38bdf8;
}

.download {
    background: transparent;
    border: 1px solid #475569;
    color: white;
}

/* 🔹 Grid */
.results-grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

/* 🔹 Card */
.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    width: 500px;
    border: 1px solid rgba(255,255,255,0.1);
}

/* 🔹 Chart */
.chart {
    display: flex;
    align-items: flex-end;
    gap: 40px;
    height: 200px;
    margin: 20px 0;
    border-left: 2px dashed #475569;
    border-bottom: 2px dashed #475569;
    padding: 10px;
}

.bar {
   width: 80px;
    background: #60a5fa;
    text-align: center;
    color: white;
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 5px;
}

.bar.dark {
    background: #2563eb;
}
.winner {
    background: #334155;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 3px;
}
/* 🌞 LIGHT MODE */
/* 🌞 LIGHT MODE (ADMIN RESULTS PAGE) */
.light-mode {
    background: #f1f5f9;
    color: #0f172a;
}

/* Navbar */
.light-mode .navbar {
    background: #e2e8f0;
    border-bottom: 1px solid #cbd5e1;
}

/* Nav links */
.light-mode .nav-links a {
    color: #334155;
}

/* Cards */
.light-mode .card {
    background: white;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

/* Chart borders */
.light-mode .chart {
    border-left: 2px dashed #cbd5e1;
    border-bottom: 2px dashed #cbd5e1;
}

/* Bars */
.light-mode .bar {
    background: #3b82f6;
    color: white;
}

.light-mode .bar.dark {
    background: #1d4ed8;
}

/* Buttons */
.light-mode .download {
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

/* Top text */
.light-mode h1,
.light-mode h2 {
    color: #0f172a;
}
    </style>
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
    <div class="logo">☑ Smart Vote</div>

    <nav class="nav-links">
        <a href="smsAdminDashboard.html">Dashboard</a>
        <a href="smsAdminManage.html">Candidates</a>
        <a href="smsAdminElection.html">Election</a>
        <a href="#">Results</a>
        <!-- <a href="#">Audit Log</a> -->
    </nav>

    <div class="nav-right">
        <span class="icon" style="cursor: pointer;">☀</span>
        <span class="user">Admin User →</span>
    </div>
</header>

<!-- 🔹 Main -->
<div class="container">

    <div class="top-bar">
        <h1>Election Results</h1>

        <div class="actions">
            <button class="declare" id="declareBtn">🏆 Declare Results</button>
            <button class="download" id="downloadBtn">⬇ Download</button>
        </div>
    </div>

    <div class="results-grid">

        <!-- CR -->
        <div class="card">
            <h2>🏆 CR Results</h2>

            <div class="chart"></div>
            <div class="winner">Loading...</div>
        </div>

        <!-- DCR -->
        <div class="card">
            <h2>🏆 DCR Results</h2>

            <div class="chart"></div>
            <div class="winner">Loading...</div>
        </div>

    </div>

</div>

<!-- <script>
// 🔐 PROTECT PAGE
if (!localStorage.getItem("isLoggedIn")) {

</script> -->
<script>
    
// 🔐 PROTECT PAGE
if (!localStorage.getItem("isLoggedIn")) {
    window.location.replace("smshome.html");
}

// 🚫 BLOCK BACK BUTTON
window.history.pushState(null, null, window.location.href);
window.onpopstate = function () {
    window.history.pushState(null, null, window.location.href);
};

    // ==============================
// 🌙 DARK MODE TOGGLE
// ==============================
const toggleIcon = document.querySelector(".icon");

toggleIcon.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
        toggleIcon.textContent = "🌙";
    } else {
        toggleIcon.textContent = "☀";
    }
});
// logout
const userText = document.querySelector(".user");

userText.addEventListener("click", () => {
    if (confirm("Logout?")) {
        localStorage.clear();

        // ❗ IMPORTANT
        window.location.replace("smshome.html");
    }
});
// chart
async function loadResults() {

    const res = await fetch("http://localhost:5000/api/results");
    const data = await res.json();

    // 🔥 Separate CR & DCR
    const cr = data.filter(c => c.position === "CR");
    const dcr = data.filter(c => c.position === "DCR");

    renderChart(cr, document.querySelectorAll(".chart")[0], "CR");
    renderChart(dcr, document.querySelectorAll(".chart")[1], "DCR");
}

function renderChart(candidates, container, type) {

    container.innerHTML = "";

    let maxVotes = 1;

    candidates.forEach(c => {
        if (c.votes > maxVotes) maxVotes = c.votes;
    });

    candidates.forEach((c, i) => {

        const height = (c.votes / maxVotes) * 150; // scale

        container.innerHTML += `
            <div class="bar ${i % 2 === 0 ? "" : "dark"}"
                style="height:${height}px">
                ${c.name}<br>${c.votes}
            </div>
        `;
    });

    // 🏆 Winner
    const winner = candidates.reduce((a, b) => a.votes > b.votes ? a : b);

    const winnerBox = container.parentElement.querySelector(".winner");

    winnerBox.innerHTML =
        `🏆 Winner: ${winner.name} (${winner.votes} votes)`;
}

loadResults();

// declare button
document.getElementById("declareBtn").addEventListener("click", async () => {

    const res = await fetch("http://localhost:5000/api/declare", {
        method: "POST"
    });

    const data = await res.json();

    alert(`🏆 CR: ${data.crWinner.name}
🏆 DCR: ${data.dcrWinner.name}`);

});

// download PDF
document.getElementById("downloadBtn").addEventListener("click", async () => {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const res = await fetch("http://localhost:5000/api/results");
    const data = await res.json();

    let y = 10;

    doc.text("Election Results", 10, y);
    y += 10;

    data.forEach(c => {
        doc.text(`${c.name} (${c.position}) - ${c.votes} votes`, 10, y);
        y += 8;
    });

    doc.save("results.pdf");
});
</script>

</body>
</html>

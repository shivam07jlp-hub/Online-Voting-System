<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <!-- <link rel="stylesheet" href="admin.css"> -->
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

/* 🔹 Body */
body {
    background: linear-gradient(to bottom, #0f172a, #020617);
    color: white;
}

/* 🔹 Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    color: #38bdf8;
    font-weight: 600;
    cursor: pointer;
}

.nav-links a {
    margin: 0 10px;
    color: #cbd5f5;
    text-decoration: none;
}

.nav-right {
    display: flex;
    gap: 15px;
}
.user {
    color: #cbd5f5;
    cursor: pointer;
}

/* 🔹 Container */
.container {
    padding: 30px 40px;
}

/* 🔹 Top */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.status {
    background: #38bdf8;
    color: #020617;
    padding: 6px 15px;
    border-radius: 20px;
    font-weight: 600;
}

/* 🔹 Stats */
.stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

.stat-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    width: 260px;
    border: 1px solid rgba(255,255,255,0.1);
}

.stat-card p {
    color: #cbd5f5;
    margin-bottom: 10px;
}

.stat-card h2 {
    font-size: 28px;
}

/* 🔹 Timer */
.timer-card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
}

.timer-card h2 {
    margin-bottom: 10px;
}

.timer-card p {
    color: #cbd5f5;
}


/* 🌞 LIGHT MODE (FIXED FOR ADMIN DASHBOARD) */
.light-mode {
    background: #f1f5f9;
    color: #0f172a;
}

/* Navbar */
.light-mode .navbar {
    background: #e2e8f0;
    border-bottom: 1px solid #cbd5e1;
}

/* Nav links */
.light-mode .nav-links a {
    color: #334155;
}

/* User text */
.light-mode .user {
    color: #0f172a;
}

/* Container */
.light-mode .container {
    background: #f1f5f9;
}

/* Status badge */
.light-mode .status {
    background: #0ea5e9;
    color: white;
}

/* Stat cards */
.light-mode .stat-card {
    background: white;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

.light-mode .stat-card p {
    color: #475569;
}

/* Timer card */
.light-mode .timer-card {
    background: white;
    color: #0f172a;
    border: 1px solid #cbd5e1;
}

.light-mode .timer-card p {
    color: #475569;
}
    </style>
</head>
<body>

<!-- 🔹 Navbar -->
<header class="navbar">
    <div class="logo">☑ Smart Vote</div>

    <nav class="nav-links">
        <a href="#">Dashboard</a>
        <a href="smsAdminManage.html">Candidates</a>
        <a href="smsAdminElection.html">Election</a>
        <a href="smsAdminResult.html">Results</a>
        <!-- <a href="#">Audit Log</a> -->
    </nav>

    <div class="nav-right">
        <span class="icon" style="cursor: pointer;">☀</span>
        <span class="user">Admin User →</span>
    </div>
</header>

<!-- 🔹 Main -->
<div class="container">

    <div class="top-bar">
        <h1>Admin Dashboard</h1>
        <div class="status">ENDED</div>
    </div>

    <!-- 🔹 Stats -->
    <div class="stats">

        <div class="stat-card">
            <p>Total Students</p>
            <h2 id="students"></h2>
        </div>

        <div class="stat-card">
            <p>Votes Cast</p>
            <h2 id="votes"></h2>
        </div>

        <div class="stat-card">
            <p>Candidates</p>
            <h2 id="candidates"></h2>
        </div>

        <div class="stat-card">
            <p>Participation</p>
            <h2 id="percentage"></h2>
        </div>

    </div>

    <!-- 🔹 Timer Section -->
    <div class="timer-card">
        <h2>Election Timer</h2>
        <p id="timer">Loading...</p>
    </div>

</div>

<!-- <script>
// 🔐 PROTECT PAGE
if (!localStorage.getItem("isLoggedIn")) {

</script> -->
<script>
    // 🔐 PROTECT PAGE
if (!localStorage.getItem("isLoggedIn")) {
    window.location.replace("smshome.html");
}

// 🚫 BLOCK BACK BUTTON
window.history.pushState(null, null, window.location.href);
window.onpopstate = function () {
    window.history.pushState(null, null, window.location.href);
};
    // ==============================
// 🌙 DARK MODE TOGGLE
// ==============================
const toggleIcon = document.querySelector(".icon");

toggleIcon.addEventListener("click", () => {
    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
        toggleIcon.textContent = "🌙";
    } else {
        toggleIcon.textContent = "☀";
    }
});

// dashboard
async function loadStats() {

    const res = await fetch("http://localhost:5000/api/stats");
    const data = await res.json();

    document.getElementById("students").innerText = data.totalStudents;
    document.getElementById("votes").innerText = data.totalVotes;
    document.getElementById("candidates").innerText = data.totalCandidates;

    // 📊 Participation %
    let percent = 0;
    if (data.totalStudents > 0) {
        percent = ((data.totalVotes / data.totalStudents) * 100).toFixed(1);
    }

    document.getElementById("percentage").innerText = percent + "%";
}

// timer
async function startElectionTimer() {

    const res = await fetch("http://localhost:5000/api/election");
    const data = await res.json();

    if (!data) {
        document.getElementById("timer").innerText = "Not Set ❌";
        return;
    }

    const start = new Date(data.startTime).getTime();
    const end = new Date(data.endTime).getTime();

    const timer = setInterval(() => {

        const now = new Date().getTime();

        if (now < start) {
            document.getElementById("timer").innerText = "Not Started ⏳";
            return;
        }

        if (now > end) {
            clearInterval(timer);
            document.getElementById("timer").innerText = "Election Ended ❌";
            return;
        }

        const diff = end - now;

        const hours = Math.floor(diff / (1000 * 60 * 60));
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("timer").innerText =
            `${hours}h ${minutes}m ${seconds}s`;

    }, 1000);
}

// elction status
async function updateElectionStatus() {

    const res = await fetch("http://localhost:5000/api/election");
    const data = await res.json();

    const statusBox = document.querySelector(".status");

    const now = new Date().getTime();
    const start = new Date(data.startTime).getTime();
    const end = new Date(data.endTime).getTime();

    if (data.isDeclared || now > end) {
        statusBox.innerText = "Election: Ended ❌";
        statusBox.style.background = "#ef4444"; // red
    }
    else if (now >= start && now <= end) {
        statusBox.innerText = "Election: Live 🟢";
        statusBox.style.background = "#22c55e"; // green
    }
    else {
        statusBox.innerText = "Election: Not Started ⏳";
        statusBox.style.background = "#f59e0b"; // yellow
    }
}

startElectionTimer();
loadStats();
updateElectionStatus();
// logout
const userText = document.querySelector(".user");

userText.addEventListener("click", () => {
    if (confirm("Logout?")) {
        localStorage.clear();

        // ❗ IMPORTANT
        window.location.replace("smshome.html");
    }
});
</script>

</body>
</html>
